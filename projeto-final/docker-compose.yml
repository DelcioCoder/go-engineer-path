services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://gouser:gopass@db:5432/events?sslmode=disable
      - WORKER_COUNT=10
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=gouser
      - POSTGRES_PASSWORD=gopass
      - POSTGRES_DB=events
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U gouser -d events" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
